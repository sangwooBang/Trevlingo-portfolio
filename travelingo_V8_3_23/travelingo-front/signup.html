<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Travelingo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 회원가입 페이지 스타일 */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 400px;
            width: 100%;
        }

        .auth-logo {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .auth-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text);
        }

        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .auth-link a:hover {
            opacity: 0.8;
        }

        .auth-divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #E0E0E0;
        }

        .auth-divider span {
            position: relative;
            background: white;
            padding: 0 15px;
        }

        .back-home {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            width: 100%;
        }

        .back-home:hover {
            background: var(--primary);
            color: white;
        }

        .password-hint {
            font-size: 0.85rem;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">✈️</div>
            <h1 class="auth-title">Travelingo</h1>
            <p class="auth-subtitle">새 계정을 만들어 시작하세요</p>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" placeholder="표시할 이름" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="6자 이상의 비밀번호" required minlength="6">
                    <div class="password-hint">최소 6자 이상이어야 합니다</div>
                </div>

                <button type="submit" class="btn-auth">회원가입</button>
            </form>

            <p class="auth-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </p>

            <div class="auth-divider"><span>또는</span></div>

            <a href="index.html" class="back-home">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        // API 기본 URL
        const API_BASE = 'http://localhost:8080/api';

        /**
         * 회원가입 폼 제출 처리 함수
         * 새로운 사용자를 백엔드에 등록하고
         * 성공 시 로그인 페이지로 이동
         * @param {Event} event - 폼 제출 이벤트
         */
        async function handleSignup(event) {
            event.preventDefault();

            // 입력 필드에서 닉네임, 이메일, 비밀번호 가져오기
            const nickname = document.getElementById('nickname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // POST /api/auth/signup 요청 전송
                const response = await fetch(`${API_BASE}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        nickname: nickname
                    })
                });

                // JSON 응답 파싱
                const data = await response.json();

                // 응답 상태 확인
                if (response.ok && data.userId) {
                    // 성공: 회원가입 성공 메시지 표시 후 로그인 페이지로 이동
                    alert('회원가입이 완료되었습니다! 로그인해주세요.');
                    window.location.href = 'login.html';
                } else {
                    // 실패: 에러 메시지 표시
                    alert(`회원가입 실패: ${data.error || data.message || '알 수 없는 오류'}`);
                }
            } catch (error) {
                // 네트워크 오류 처리
                console.error('회원가입 중 오류 발생:', error);
                alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
            }
        }
    </script>
</body>
</html>
