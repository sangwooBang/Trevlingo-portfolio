version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: travelingo-devcontainer:latest
    container_name: travelingo-dev
    volumes:
      - ..:/workspace:cached
      - gradle-cache:/workspace/.gradle
    working_dir: /workspace
    environment:
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
      GRADLE_USER_HOME: /workspace/.gradle
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: travellingo
      MYSQL_PASSWORD: travellingo_pass
      MYSQL_DATABASE: travelingo_db
    ports:
      - "8080:8080"
      - "5500:5500"
    depends_on:
      - mysql
    networks:
      - travelingo-network
    command: /bin/bash -c "while sleep 1000; do :; done"

  mysql:
    image: mysql:8.0
    container_name: travelingo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: travellingo
      MYSQL_PASSWORD: travellingo_pass
      MYSQL_DATABASE: travelingo_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../travelingo_v4_3_21/travelingo-back/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../travelingo_v4_3_21/travelingo-back/src/main/resources/data-chapter1.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    networks:
      - travelingo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql-data:
    driver: local
  gradle-cache:
    driver: local

networks:
  travelingo-network:
    driver: bridge
